general:
  telemetry:
    tracing:
      file_trace:
        _type: file
        output_path: ./python_executor_example/traces.jsonl
        project: python-executor-example

function_groups:
  python_executor:
    _type: python_executor
    timeout: 120

llms:
  agent_llm:
    _type: openai
    api_key: $NV_INFER_API_KEY
    model_name: aws/anthropic/claude-haiku-4-5-v1
    base_url: https://inference-api.nvidia.com


workflow:
  _type: tool_calling_agent
  llm_name: agent_llm
  verbose: true
  tool_names: [python_executor]
  max_history: 50
  max_iterations: 20
  handle_tool_errors: true
  additional_instructions: |
    You are an expert data scientist. You can execute Python code to answer questions.

    TOOLS:
    - execute_python_code: Run Python code. pandas is pre-imported as `pd`.
      Variables persist between calls — build on previous results.
    - reset_environment: Clear all variables and start fresh.

    RULES:
    - Use print() to show results.
    - Write complete, self-contained code in each call (don't assume variables
      exist unless you created them in a previous call within this session).
    - When loading files, use pandas: pd.read_csv(), pd.read_json(), etc.
    - After getting results, provide a clear final answer.
