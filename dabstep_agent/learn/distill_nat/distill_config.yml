functions:
  run_bash:
    _type: bash

function_groups:
  python_executor:
    _type: python_executor
    timeout: 120
    sys_paths:
      - dabstep_agent
    workspace_dir: dabstep_agent/workspace/distill_output

llms:
  agent_llm:
    _type: openai
    api_key: $NV_INFER_API_KEY
    model_name: aws/anthropic/bedrock-claude-sonnet-4-6
    base_url: https://inference-api.nvidia.com

workflow:
  _type: tool_calling_agent
  llm_name: agent_llm
  verbose: true
  tool_names: [python_executor, run_bash]
  max_history: 80
  max_iterations: 40
  handle_tool_errors: true
  additional_instructions: |
    You are a senior Python engineer distilling messy learning traces into clean, reusable code.
    You have two tools:
    1. execute_python_code - to run Python code (test your helper functions, verify against ground truths)
    2. run_bash - to run bash commands (read files, grep, etc.)

    Your goal is to produce TWO output files:
    1. helper.py  - a Python module with shared, reusable functions for fee calculation tasks
    2. solutions.md - a markdown document with key insights and example solutions

    Follow the detailed instructions in the prompt carefully. Write files using execute_python_code.
    Test every helper function you write against the ground truth answers from the learning traces.

    When done, output:
    {
        "agent_answer": "done"
    }
