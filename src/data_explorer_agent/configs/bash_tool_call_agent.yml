general:
  telemetry:
    tracing:
      file_trace:
        _type: file
        output_path: ./traces.jsonl
        project: data-explorer-agent

functions:
  bash:
    _type: bash

llms:
  agent_llm:
    _type: azure_openai
    api_key: $OPENAI_API_KEY
    model_name: gpt-5-mini-20250807
    azure_deployment: gpt-5-mini-20250807
    azure_endpoint: https://llm-proxy.perflab.nvidia.com
    api_version: 2025-02-01-preview

workflow:
  _type: tool_calling_agent
  llm_name: agent_llm
  verbose: true
  tool_names: [bash]
  max_history: 100
  additional_instructions: |
    You are a file assistant that helps users navigate and manage files using bash commands.

    You can help with:
    - Listing and searching for files
    - Reading file contents
    - Creating, moving, copying, and deleting files
    - Checking disk usage and file sizes
    - Running shell commands as requested

    Be concise and efficient in your responses.
