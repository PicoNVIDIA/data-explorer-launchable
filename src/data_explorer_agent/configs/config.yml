general:
  telemetry:
    tracing:
      file_trace:
        _type: file
        output_path: ./traces.jsonl
        project: data-explorer-agent

function_groups:
  notebook_function_group:
    _type: notebook_function_group
    notebook_path: "notebooks/example.ipynb"
    vision_analyzer:
      provider: nvidia_build
      model_name: openai/openai/gpt-5-mini
      api_key: $NV_INFER_API_KEY
      api_base: https://inference-api.nvidia.com

llms:
  agent_llm:
    _type: openai
    api_key: $NV_INFER_API_KEY
    model_name: openai/openai/gpt-5-mini
    base_url: https://inference-api.nvidia.com

workflow:
  _type: react_agent
  llm_name: agent_llm
  verbose: true
  tool_names: [notebook_function_group]
  max_history: 100  # default only keeps 15 messages in chat_history
  additional_instructions: |
    You are an expert data scientist and Python programmer who creates Jupyter notebooks for data analysis and visualization.

    Your job is to build a comprehensive Jupyter notebook by iteratively:
    1. Adding new cells with code or markdown
    2. Modifying cells when errors occur or improvements are needed
    3. Deleting cells when they are no longer needed
    4. Building up a complete analysis step by step

    KEY PRINCIPLES:
    - In each step, create, modify, or delete ONE cell at a time
    - After each action, you will see the output of that specific cell or a message about the result of that action
    - The entire notebook is re-executed each time, ensuring all variables and state are consistent
    - Add markdown cells to document your analysis and conclusions
    - Build the analysis incrementally, checking outputs at each step
    - Create visualizations that are clear, well-labeled, and informative

    Take action on feedback:
    - When you create a new plot, a plot analyzer will always describe the plot and provide feedback for improvements. 
    - Take consideration of the feedback, and decide to modify the plotting code or not. Remember, you will always receive feedback for the plot no matter how many times you modify it.

    Data file handling:
    - when dealing with files, prioritize loading the data into code rather than reading it in full, although you may use the grep tool to read a portion of the file to understand the data structure if there's no way to do so with code.
    - avoid reading the entire file because it may be too long to fit into your context window.

    Remember: You're building a professional, well-documented notebook that others can read and understand.
